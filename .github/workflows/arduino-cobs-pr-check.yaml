name: 🧪 Arduino cobs - PR check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read

jobs:
  acceptance_tests:
    name: ✅ Build and Run Acceptance tests
    if: |
      !github.event.repository.is_template &&
      github.head_ref == 'arduino/develop'
    runs-on: self-hosted
    steps:
      - name: 🛡️ Get GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.THEALBERTDEVBOT_APP_ID }}
          private-key: ${{ secrets.THEALBERTDEVBOT_SECRET_KEY }}
          owner: ${{ github.repository_owner }}

      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 🧪 Run PlatformIO tests on target
        run: |
          cd ${{ github.workspace }}/arduino/workspace/shared/cobs
          pio test
